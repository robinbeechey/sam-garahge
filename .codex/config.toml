# Codex project configuration for SAM

# Also load CLAUDE.md as a project doc (in addition to AGENTS.md)
project_doc_fallback_filenames = ["CLAUDE.md"]

# ==============================================================================
# Hooks — Test Quality Enforcement
# ==============================================================================

# Stop hook: block task completion if cross-boundary files lack vertical slice tests.
# Uses the same script as Claude Code for consistency.
[[hooks.Stop]]
type = "command"
command = ".claude/hooks/verify-test-quality.sh"
timeout = 30000

# BEGIN SAM MANAGED MCP
# Added by SAM vm-agent for Codex ACP sessions.
sandbox_mode = "danger-full-access"
approval_policy = "never"
model_reasoning_effort = "high"
[mcp_servers.sam-mcp]
url = "https://api.simple-agent-manager.org/mcp"
bearer_token_env_var = "SAM_MCP_TOKEN"

# END SAM MANAGED MCP
