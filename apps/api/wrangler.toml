name = "workspaces-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
port = 8787

# unicorn-magic exports toPath/traversePathUp only under the "node" condition.
# Wrangler's esbuild resolves "default" which lacks them, breaking the
# @mastra/core → execa → npm-run-path → unicorn-magic import chain.
# Alias to a local shim that provides the node-condition exports.
[alias]
"unicorn-magic" = "./src/shims/unicorn-magic.ts"

[vars]
BASE_DOMAIN = "workspaces.example.com"
VERSION = "0.1.0"
MAX_NODES_PER_USER = "10"
MAX_WORKSPACES_PER_NODE = "3"
MAX_AGENT_SESSIONS_PER_WORKSPACE = "10"
NODE_HEARTBEAT_STALE_SECONDS = "180"
MAX_PROJECTS_PER_USER = "100"
MAX_SESSIONS_PER_PROJECT = "10000"
MAX_MESSAGES_PER_SESSION = "100000"
MESSAGE_SIZE_THRESHOLD = "102400"
ACTIVITY_RETENTION_DAYS = "90"
SESSION_IDLE_TIMEOUT_MINUTES = "60"
DO_SUMMARY_SYNC_DEBOUNCE_MS = "5000"
DEFAULT_TASK_AGENT_TYPE = "opencode"
R2_BUCKET_NAME = "workspaces-dev-assets"
VM_AGENT_PROTOCOL = "https"
VM_AGENT_PORT = "8443"
DEVCONTAINER_CACHE_ENABLED = "true"
DEVCONTAINER_CACHE_REGISTRY_HOST = "registry.cloudflare.com"
DEVCONTAINER_CACHE_REPOSITORY_PREFIX = "sam-"
DEVCONTAINER_CACHE_CREDENTIAL_EXPIRATION_MINUTES = "120"
# Hetzner VM base image. `docker-ce` marketplace image skips Docker install
# (saves ~30-60s on cold provisioning). Set to `ubuntu-24.04` for emergency
# rollback without a code change (also set via GH repo variable HETZNER_BASE_IMAGE).
HETZNER_BASE_IMAGE = "docker-ce"
TASK_RUNNER_WORKSPACE_READY_POLL_INTERVAL_MS = "30000"
# Task reconciliation — inactivity check-in for silent task agents
TASK_RECONCILIATION_IDLE_MS = "300000"
TASK_RECONCILIATION_RESPONSE_DEADLINE_MS = "60000"
TASK_RECONCILIATION_PROMPT_SOFT_STALL_MS = "1800000"
TASK_RECONCILIATION_PROMPT_HARD_STALL_MS = "7200000"
TASK_RECONCILIATION_MIN_ALARM_DELAY_MS = "10000"
# AI Inference Proxy (Cloudflare AI Gateway for trial/zero-config users)
AI_PROXY_ENABLED = "true"
AI_PROXY_DEFAULT_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
AI_GATEWAY_ID = "sam"
# SAM Agent — set model to Workers AI for zero-config usage (no API key needed)
SAM_MODEL = "@cf/google/gemma-4-26b-a4b-it"
# Triggers (Event-Driven Agent Triggers)
MAX_TRIGGERS_PER_PROJECT = "10"
CRON_MIN_INTERVAL_MINUTES = "15"
CRON_TEMPLATE_MAX_LENGTH = "8000"
TRIGGER_NAME_MAX_LENGTH = "100"
# Cloudflare Container instant-session runtime.
# Generated deployment envs default CF_CONTAINER_ENABLED to "true";
# set it to "false" via GitHub environment variable or Worker var to force VM runtime.
# CF_CONTAINER_ENABLED = "false"
# CF_CONTAINER_PORT_READY_TIMEOUT_MS = "180000"
# Trial Onboarding (zero-friction URL-to-workspace)
# See docs/guides/trial-configuration.md for the full tunable list.
TRIAL_MONTHLY_CAP = "1500"
TRIAL_WORKSPACE_TTL_MS = "1200000"           # 20 min
TRIAL_DATA_RETENTION_HOURS = "168"           # 7 days
TRIAL_ANONYMOUS_USER_ID = "system_anonymous_trials"
TRIAL_EXPIRE_BATCH_SIZE = "1000"
TRIAL_CLEANUP_BATCH_SIZE = "25"
TRIAL_CLEANUP_DEADLINE_MS = "45000"
TRIAL_NODE_DELETION_LOCK_STALE_MS = "600000"
TRIAL_AGENT_TYPE_STAGING = "opencode"
TRIAL_AGENT_TYPE_PRODUCTION = "claude-code"
TRIAL_DEFAULT_WORKSPACE_PROFILE = "lightweight"
TRIALS_ENABLED_KV_KEY = "trials:enabled"

# Cloudflare Artifacts for SAM-native Git repos (GitHub-optional projects)
# NOTE: [[artifacts]] binding requires Cloudflare account-level access to Artifacts.
# scripts/deploy/sync-wrangler-config.ts auto-detects Artifacts access by probing
# the Artifacts REST API with the deploy token and includes this binding only when
# available. ARTIFACTS_BINDING_ENABLED (true/false) forces the result when set.
[[artifacts]]
binding = "ARTIFACTS"
namespace = "default"

# D1 Database
[[d1_databases]]
binding = "DATABASE"
database_name = "workspaces-dev"
database_id = "your-d1-database-id"
migrations_dir = "src/db/migrations"

# D1 Observability Database (error storage, isolated from main DB — spec 023)
[[d1_databases]]
binding = "OBSERVABILITY_DATABASE"
database_name = "observability-dev"
database_id = "your-observability-d1-id"
migrations_dir = "src/db/migrations/observability"

# KV for sessions
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"

# R2 for VM Agent binaries
[[r2_buckets]]
binding = "R2"
bucket_name = "workspaces-dev-assets"


# Durable Objects for per-project data (chat sessions, activity events, task status events)
[[durable_objects.bindings]]
name = "PROJECT_DATA"
class_name = "ProjectData"

# Durable Objects for per-node warm pool lifecycle (alarm-based idle timeout)
[[durable_objects.bindings]]
name = "NODE_LIFECYCLE"
class_name = "NodeLifecycle"

# Durable Object for admin real-time log streaming (singleton — spec 023)
[[durable_objects.bindings]]
name = "ADMIN_LOGS"
class_name = "AdminLogs"

# Durable Object for alarm-driven task orchestration (TDF-2 — one DO per task)
[[durable_objects.bindings]]
name = "TASK_RUNNER"
class_name = "TaskRunner"

# Durable Object for per-user notification storage and real-time delivery
[[durable_objects.bindings]]
name = "NOTIFICATION"
class_name = "NotificationService"

# Durable Object for per-user Codex OAuth token refresh serialization
[[durable_objects.bindings]]
name = "CODEX_REFRESH_LOCK"
class_name = "CodexRefreshLock"

# Durable Object for per-user GitHub OAuth user-token refresh serialization
[[durable_objects.bindings]]
name = "GITHUB_USER_ACCESS_TOKEN_LOCK"
class_name = "GitHubUserAccessTokenLock"

# Durable Object for trial-onboarding monthly cap counter (singleton; keyed by YYYY-MM)
[[durable_objects.bindings]]
name = "TRIAL_COUNTER"
class_name = "TrialCounter"

# Durable Object for per-trial SSE event buffering (keyed by trialId)
[[durable_objects.bindings]]
name = "TRIAL_EVENT_BUS"
class_name = "TrialEventBus"

# Durable Object for alarm-driven trial provisioning (one DO per trialId)
[[durable_objects.bindings]]
name = "TRIAL_ORCHESTRATOR"
class_name = "TrialOrchestrator"

# Durable Object for per-project orchestration (one DO per projectId)
[[durable_objects.bindings]]
name = "PROJECT_ORCHESTRATOR"
class_name = "ProjectOrchestrator"

# Durable Object for per-user SAM agent session (one DO per userId)
[[durable_objects.bindings]]
name = "SAM_SESSION"
class_name = "SamSession"

# Durable Object for per-project AI technical lead (one DO per projectId)
[[durable_objects.bindings]]
name = "PROJECT_AGENT"
class_name = "ProjectAgent"

# Durable Object for atomic per-user AI token budget accounting
[[durable_objects.bindings]]
name = "AI_TOKEN_BUDGET_COUNTER"
class_name = "AiTokenBudgetCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProjectData"]

[[migrations]]
tag = "v2"
new_classes = ["NodeLifecycle"]

[[migrations]]
tag = "v3"
new_classes = ["AdminLogs"]

[[migrations]]
tag = "v4"
new_classes = ["TaskRunner"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["NotificationService"]

[[migrations]]
tag = "v6"
new_classes = ["CodexRefreshLock"]  # Intentionally stateless: uses D1 for credential storage, no per-instance SQLite needed

[[migrations]]
tag = "v7"
new_sqlite_classes = ["TrialCounter"]

[[migrations]]
tag = "v8"
new_classes = ["TrialEventBus"]  # In-memory only — no SQLite storage needed for short-lived trial streams

[[migrations]]
tag = "v9"
new_sqlite_classes = ["TrialOrchestrator"]  # Alarm-driven trial provisioning; SQLite-backed per Cloudflare recommendation for new DO classes

[[migrations]]
tag = "v10"
new_sqlite_classes = ["ProjectOrchestrator"]  # Per-project orchestration brain; SQLite-backed for scheduling state and decision log

[[migrations]]
tag = "v11"
new_sqlite_classes = ["SamSession"]  # Per-user SAM agent; SQLite-backed for conversation history

[[migrations]]
tag = "v12"
new_sqlite_classes = ["ProjectAgent"]  # Per-project AI tech lead; SQLite-backed for conversation history

# Sandbox SDK container retained for experimental toolbox/diagnostic routes.
[[containers]]
class_name = "SandboxDO"
image = "./Dockerfile.sandbox"
instance_type = "standard-1"
max_instances = 3

[[durable_objects.bindings]]
name = "SANDBOX"
class_name = "SandboxDO"

[[migrations]]
tag = "v13"
new_sqlite_classes = ["SandboxDO"]  # Sandbox SDK container DO; SQLite-backed per CF requirement

[[migrations]]
tag = "v14"
new_sqlite_classes = ["AiTokenBudgetCounter"]

[[migrations]]
tag = "v15"
new_classes = ["GitHubUserAccessTokenLock"]  # Stateless per-user mutex for BetterAuth GitHub OAuth refresh

# Raw Cloudflare Container runtime for SAM instant-session vm-agent nodes.
[[containers]]
class_name = "VmAgentContainer"
image = "./Dockerfile.vm-agent-container"
instance_type = "standard-1"
max_instances = 3

[[durable_objects.bindings]]
name = "VM_AGENT_CONTAINER"
class_name = "VmAgentContainer"

[[migrations]]
tag = "v16"
new_sqlite_classes = ["VmAgentContainer"]  # Raw Cloudflare Container DO for instant-session vm-agent

# Analytics Engine for usage tracking (Phase 1 — server-side analytics)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "sam_analytics"

# Workers AI for speech-to-text transcription
[ai]
binding = "AI"

# NOTE: [env.*] sections are NOT checked in — they are generated at deploy time
# by scripts/deploy/sync-wrangler-config.ts from Pulumi outputs + top-level config.
# tail_consumers are also generated (and intentionally absent from top-level config
# because they break Vitest — Cloudflare issue #9343).

# Cron triggers:
# - Every 5 minutes: provisioning timeout checks, warm node cleanup, stuck task recovery,
#   trial expiry sweep
# - Hourly at :30: monthly AI cost aggregation per user (Gateway logs → KV cache)
# - Daily at 03:00 UTC: analytics event forwarding to external platforms (Phase 4)
# - Daily at 04:00 UTC: trial waitlist purge (rows with notified_at older than
#   TRIAL_WAITLIST_PURGE_DAYS). Configurable via TRIAL_CRON_WAITLIST_CLEANUP.
# - Monthly on the 1st at 05:00 UTC: trial counter rollover audit (prune DO rows beyond
#   TRIAL_COUNTER_KEEP_MONTHS). Configurable via TRIAL_CRON_ROLLOVER_CRON.
#   NOTE: Intentionally offset from the 03:00 daily job to avoid collision on the 1st.
# NOTE: Cron strings are matched exactly in index.ts:scheduled() to dispatch between
# the different jobs. If you change them here, update the comparisons in the scheduled
# handler (or the corresponding TRIAL_CRON_* env vars).
[triggers]
crons = ["*/5 * * * *", "30 * * * *", "0 3 * * *", "0 4 * * *", "0 5 1 * *"]

# Secrets (set via wrangler secret put):
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - GITHUB_APP_ID
# - GITHUB_APP_PRIVATE_KEY
# - CF_API_TOKEN
# - CF_ZONE_ID
# - CF_ACCOUNT_ID (required for admin observability log viewer)
# - JWT_PRIVATE_KEY
# - JWT_PUBLIC_KEY
# - ENCRYPTION_KEY
# - BETTER_AUTH_SECRET (optional — overrides ENCRYPTION_KEY for BetterAuth sessions)
# - CREDENTIAL_ENCRYPTION_KEY (optional — overrides ENCRYPTION_KEY for AES-GCM credential encryption)
# - GITHUB_WEBHOOK_SECRET (optional — overrides ENCRYPTION_KEY for GitHub webhook HMAC)
# - ORIGIN_CA_CERT (Origin CA certificate for VM agent TLS)
# - ORIGIN_CA_KEY (Origin CA private key for VM agent TLS)
# - GOOGLE_CLIENT_ID (optional — Google Cloud Console OAuth client ID for infra/GCP OIDC integration)
# - GOOGLE_CLIENT_SECRET (optional — Google Cloud Console OAuth client secret for infra/GCP)
# - GOOGLE_LOGIN_CLIENT_ID (optional — Google login OAuth client ID for "Sign in with Google"; separate client, or set via /setup)
# - GOOGLE_LOGIN_CLIENT_SECRET (optional — Google login OAuth client secret; separate client, or set via /setup)
# - GITLAB_HOST (optional — GitLab OAuth host, e.g. https://gitlab.com; or set via /setup)
# - GITLAB_CLIENT_ID (optional — GitLab OAuth application ID; or set via /setup)
# - GITLAB_CLIENT_SECRET (optional — GitLab OAuth secret; or set via /setup)
# - SEGMENT_WRITE_KEY (optional — Segment.io write key, enables Segment event forwarding)
# - GA4_API_SECRET (optional — Google Analytics 4 API secret, enables GA4 forwarding; NOTE: GA4 Measurement Protocol requires api_secret as a query parameter — ensure outbound request URLs are not logged)
# - R2_ACCESS_KEY_ID (optional — R2 S3-compatible API token key ID, enables task attachment presigned uploads)
# - R2_SECRET_ACCESS_KEY (optional — R2 S3-compatible API token secret, enables task attachment presigned uploads)
# - TRIAL_CLAIM_TOKEN_SECRET (required when trials are enabled — HMAC secret for sam_trial_claim / sam_trial_fingerprint cookies. 32+ bytes base64.)
# - CF_AIG_TOKEN (optional — Cloudflare AI Gateway Unified Billing token; enables OpenAI/Anthropic models without separate API keys)
