sonar.projectKey=raphaeltm_simple-agent-manager
sonar.organization=raphaeltm

# Exclude test files and config scaffolding from duplication detection —
# test scaffolding (D1 seed helpers, DO stub factories) is intentionally
# similar across test suites and does not warrant abstraction.
sonar.cpd.exclusions=**/*.config.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*_test.go,**/tests/**,.github/workflows/**,vitest.coverage.ts,sonar-project.properties
