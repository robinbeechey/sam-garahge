sonar.projectKey=raphaeltm_simple-agent-manager
sonar.organization=raphaeltm
sonar.go.coverage.reportPaths=packages/cli/coverage.out

# Fully exclude generated artifacts and declarative schema sources from
# SonarCloud analysis — these are not behavioral code.
#
# Playwright visual-audit specs are listed here (not just in
# sonar.cpd.exclusions) because SonarCloud Automatic Analysis honors
# sonar.exclusions but does NOT honor sonar.cpd.exclusions. These specs are
# pure screenshot/visual scaffolding (mock-data factories, viewport setup,
# overflow assertions) that rule 17 mandates be self-contained per file, so
# they are intentionally similar across suites and carry no behavioral logic.
sonar.exclusions=**/*.openapi.json,apps/api/src/openapi/**,apps/api/openapi/**,apps/api/scripts/generate-openapi.ts,apps/web/tests/playwright/**

# Exclude test files, config scaffolding, build scripts, and OpenAPI spec
# sources from duplication detection — test scaffolding (D1 seed helpers,
# DO stub factories) is intentionally similar across test suites and does
# not warrant abstraction. Build scripts share boilerplate patterns.
# OpenAPI spec sources and ProjectData row schemas are schema definitions.
sonar.cpd.exclusions=**/*.config.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*_test.go,**/tests/**,.github/workflows/**,vitest.coverage.ts,sonar-project.properties,**/openapi/**,apps/api/src/openapi/**,apps/api/src/durable-objects/project-data/row-schemas/**,**/scripts/**

# packages/cli is currently a standard-library-only Go module. Go does not
# generate go.sum without module dependencies, so suppress the lockfile rule
# for this module file only instead of committing a meaningless placeholder.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=text:S8566
sonar.issue.ignore.multicriteria.e1.resourceKey=packages/cli/go.mod
