name: Deploy Production

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
  workflow_dispatch:
    inputs:
      skip_agent:
        description: 'Skip VM Agent build and upload'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Preview changes without applying'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Only one production deployment at a time, queue subsequent ones
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Gate only on the GitHub Actions CI workflow result. SonarCloud is a
  # separate GitHub App check and must not suppress production deploys.
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: production
      skip_agent: ${{ inputs.skip_agent || false }}
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
