name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying'
        required: false
        type: boolean
        default: false

# Only one staging deployment at a time; queue (don't cancel) concurrent requests
concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: staging
      skip_agent: false # Required: staging VMs need the agent binary in R2
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit

  # Smoke tests run after successful staging deployment.
  # Requires SMOKE_TEST_TOKEN secret in the staging environment.
  # Skipped if the token is not configured (new deployments before token setup).
  smoke-tests:
    needs: deploy
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      SMOKE_TEST_TOKEN: ${{ secrets.SMOKE_TEST_TOKEN }}
      SMOKE_TEST_URL: https://app.${{ vars.BASE_DOMAIN }}
      SMOKE_TEST_API_URL: https://api.${{ vars.BASE_DOMAIN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          mkdir -p /tmp/pw && cd /tmp/pw
          npm init -y > /dev/null 2>&1
          npm install @playwright/test
          npx playwright install chromium
          mkdir -p $GITHUB_WORKSPACE/node_modules/.bin
          ln -sf /tmp/pw/node_modules/@playwright $GITHUB_WORKSPACE/node_modules/@playwright
          ln -sf /tmp/pw/node_modules/playwright $GITHUB_WORKSPACE/node_modules/playwright
          ln -sf /tmp/pw/node_modules/playwright-core $GITHUB_WORKSPACE/node_modules/playwright-core
          ln -sf /tmp/pw/node_modules/.bin/playwright $GITHUB_WORKSPACE/node_modules/.bin/playwright

      - name: Run smoke tests
        if: ${{ env.SMOKE_TEST_TOKEN != '' }}
        run: npx playwright test --config=tests/smoke/playwright.config.ts

      - name: Skip notice (no token configured)
        if: ${{ env.SMOKE_TEST_TOKEN == '' }}
        run: echo "⚠ Smoke tests skipped — SMOKE_TEST_TOKEN not configured in staging environment secrets"
