name: Deploy (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'GitHub Environment name (e.g. production, staging)'
      skip_agent:
        required: false
        type: boolean
        default: false
      dry_run:
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  GO_VERSION: '1.24'

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      config_valid: ${{ steps.check.outputs.valid }}
    steps:
      - name: Check Required Configuration
        id: check
        env:
          HAS_BASE_DOMAIN: ${{ vars.BASE_DOMAIN != '' }}
          HAS_CF_API_TOKEN: ${{ secrets.CF_API_TOKEN != '' }}
          HAS_CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID != '' }}
          HAS_CF_ZONE_ID: ${{ secrets.CF_ZONE_ID != '' }}
          HAS_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID != '' }}
          HAS_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY != '' }}
          HAS_PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE != '' }}
          HAS_GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID != '' }}
          HAS_GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET != '' }}
          HAS_GH_APP_ID: ${{ secrets.GH_APP_ID != '' }}
          HAS_GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY != '' }}
          HAS_GH_APP_SLUG: ${{ secrets.GH_APP_SLUG != '' }}
          HAS_GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET != '' }}
          HAS_CF_ORIGIN_CA_KEY: ${{ secrets.CF_ORIGIN_CA_KEY != '' }}
        run: |
          MISSING=""

          if [ "$HAS_BASE_DOMAIN" != "true" ]; then
            MISSING="$MISSING\n  - vars.BASE_DOMAIN"
          fi
          if [ "$HAS_CF_API_TOKEN" != "true" ]; then
            MISSING="$MISSING\n  - secrets.CF_API_TOKEN"
          fi
          if [ "$HAS_CF_ACCOUNT_ID" != "true" ]; then
            MISSING="$MISSING\n  - secrets.CF_ACCOUNT_ID"
          fi
          if [ "$HAS_CF_ZONE_ID" != "true" ]; then
            MISSING="$MISSING\n  - secrets.CF_ZONE_ID"
          fi
          if [ "$HAS_R2_ACCESS_KEY_ID" != "true" ]; then
            MISSING="$MISSING\n  - secrets.R2_ACCESS_KEY_ID"
          fi
          if [ "$HAS_R2_SECRET_ACCESS_KEY" != "true" ]; then
            MISSING="$MISSING\n  - secrets.R2_SECRET_ACCESS_KEY"
          fi
          if [ "$HAS_PULUMI_CONFIG_PASSPHRASE" != "true" ]; then
            MISSING="$MISSING\n  - secrets.PULUMI_CONFIG_PASSPHRASE"
          fi
          if [ "$HAS_GH_CLIENT_ID" != "true" ]; then
            MISSING="$MISSING\n  - secrets.GH_CLIENT_ID"
          fi
          if [ "$HAS_GH_CLIENT_SECRET" != "true" ]; then
            MISSING="$MISSING\n  - secrets.GH_CLIENT_SECRET"
          fi
          if [ "$HAS_GH_APP_ID" != "true" ]; then
            MISSING="$MISSING\n  - secrets.GH_APP_ID"
          fi
          if [ "$HAS_GH_APP_PRIVATE_KEY" != "true" ]; then
            MISSING="$MISSING\n  - secrets.GH_APP_PRIVATE_KEY"
          fi
          if [ "$HAS_GH_APP_SLUG" != "true" ]; then
            MISSING="$MISSING\n  - secrets.GH_APP_SLUG"
          fi
          if [ "$HAS_GH_WEBHOOK_SECRET" != "true" ]; then
            echo "::notice::GH_WEBHOOK_SECRET not set — GitHub webhook signature verification will be disabled. Set this secret to enable webhook security."
          fi
          if [ "$HAS_CF_ORIGIN_CA_KEY" != "true" ]; then
            echo "::notice::CF_ORIGIN_CA_KEY not set — using CF_API_TOKEN for Origin CA certs. If Pulumi fails with error 1016, ensure your API token has Zone > SSL and Certificates > Edit permission."
          fi

          if [ -n "$MISSING" ]; then
            echo "::error::Missing required configuration in GitHub Environment '${{ inputs.environment }}':$MISSING"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Missing Configuration" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following configuration is required in the GitHub Environment '${{ inputs.environment }}':" >> $GITHUB_STEP_SUMMARY
            echo -e "$MISSING" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Setup Instructions" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to **Settings > Environments > ${{ inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
            echo "2. Add the missing variables and secrets" >> $GITHUB_STEP_SUMMARY
            echo "3. Re-run this workflow" >> $GITHUB_STEP_SUMMARY
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "All required configuration present"
          echo "valid=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment }}
    outputs:
      api_url: ${{ steps.output.outputs.api_url }}
      app_url: ${{ steps.output.outputs.app_url }}

    steps:
      # ========================================
      # Phase 0: Setup
      # ========================================
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Pulumi CLI
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0

      - name: Determine Stack Name
        id: stack
        run: |
          # Map environment to Pulumi stack name
          case "${{ inputs.environment }}" in
            production) STACK="prod" ;;
            staging) STACK="staging" ;;
            *) STACK="${{ inputs.environment }}" ;;
          esac
          echo "name=$STACK" >> $GITHUB_OUTPUT
          echo "Stack: $STACK for environment: ${{ inputs.environment }}"

      - name: Compute Resource Prefix
        id: prefix
        run: |
          EXPLICIT="${{ vars.RESOURCE_PREFIX }}"
          if [ -n "$EXPLICIT" ]; then
            echo "value=$EXPLICIT" >> $GITHUB_OUTPUT
            echo "Resource prefix (explicit): $EXPLICIT"
          else
            # Derive from BASE_DOMAIN: 's' + first 6 hex chars of sha256
            # Must match infra/resources/config.ts derivePrefix()
            DOMAIN="${{ vars.BASE_DOMAIN }}"
            HASH=$(echo -n "$DOMAIN" | sha256sum | cut -c1-6)
            PREFIX="s${HASH}"
            echo "value=$PREFIX" >> $GITHUB_OUTPUT
            echo "Resource prefix (derived from $DOMAIN): $PREFIX"
          fi

      # ========================================
      # Phase 1: Infrastructure (Pulumi)
      # ========================================
      - name: Create Pulumi State Bucket (if not exists)
        run: |
          BUCKET_NAME="${{ vars.PULUMI_STATE_BUCKET || format('{0}-pulumi-state', steps.prefix.outputs.value) }}"

          set +e
          OUTPUT=$(npx wrangler r2 bucket create "$BUCKET_NAME" 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"

          if [ "$STATUS" -eq 0 ]; then
            echo "Created R2 bucket: $BUCKET_NAME"
          elif echo "$OUTPUT" | grep -Eq 'already exists, and you own it|\[code: 10004\]'; then
            echo "R2 bucket already exists: $BUCKET_NAME"
          else
            echo "::error title=Pulumi state bucket setup failed::Failed to create or verify R2 bucket '$BUCKET_NAME'. Check CF_API_TOKEN, CF_ACCOUNT_ID, and bucket permissions for the '${{ inputs.environment }}' GitHub environment."
            exit "$STATUS"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Validate Pulumi R2 Backend Access
        run: |
          BUCKET_NAME="${{ vars.PULUMI_STATE_BUCKET || format('{0}-pulumi-state', steps.prefix.outputs.value) }}"
          R2_ENDPOINT="${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          CHECK_SCRIPT="apps/api/.pulumi-r2-preflight.mjs"
          trap 'rm -f "$CHECK_SCRIPT"' EXIT
          cat > "$CHECK_SCRIPT" <<'JS'
          import { HeadObjectCommand, S3Client } from "@aws-sdk/client-s3";

          const bucket = process.env.BUCKET_NAME;
          const endpoint = process.env.R2_ENDPOINT;
          const accessKeyId = process.env.AWS_ACCESS_KEY_ID;
          const secretAccessKey = process.env.AWS_SECRET_ACCESS_KEY;

          if (!bucket || !endpoint || !accessKeyId || !secretAccessKey) {
            throw new Error("Missing required Pulumi R2 backend preflight environment");
          }

          const client = new S3Client({
            region: "auto",
            endpoint: `https://${endpoint}`,
            forcePathStyle: true,
            credentials: { accessKeyId, secretAccessKey },
          });

          try {
            await client.send(new HeadObjectCommand({ Bucket: bucket, Key: ".pulumi/meta.yaml" }));
            console.log(`Pulumi R2 backend read check succeeded for bucket: ${bucket}`);
          } catch (error) {
            const details = error;
            const status = details.$metadata?.httpStatusCode;
            const code = details.name || details.Code || "Unknown";

            if (status === 404 || code === "NotFound" || code === "NoSuchKey") {
              console.log("Pulumi metadata object is not present yet; continuing so Pulumi can initialize the backend.");
              process.exit(0);
            }

            if (status === 403 || code === "AccessDenied") {
              console.error(`PULUMI_R2_ACCESS_DENIED status=${status ?? "unknown"} code=${code}`);
              process.exit(13);
            }

            console.error(`PULUMI_R2_PREFLIGHT_FAILED status=${status ?? "unknown"} code=${code}`);
            process.exit(1);
          }
          JS

          set +e
          OUTPUT=$(BUCKET_NAME="$BUCKET_NAME" R2_ENDPOINT="$R2_ENDPOINT" node "$CHECK_SCRIPT" 2>&1)
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            echo "$OUTPUT"
          elif [ "$STATUS" -eq 13 ]; then
            echo "::error title=Pulumi R2 backend access denied::R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY cannot read .pulumi/meta.yaml from bucket '$BUCKET_NAME'. Rotate these secrets for the '${{ inputs.environment }}' GitHub environment with an R2 API token scoped to this bucket in the same Cloudflare account as CF_ACCOUNT_ID."
            {
              echo "## Pulumi R2 Backend Access Denied"
              echo ""
              echo "The Cloudflare API token could verify the state bucket, but the R2 S3 credentials could not read \`.pulumi/meta.yaml\`."
              echo ""
              echo "Rotate the GitHub Environment '${{ inputs.environment }}' secrets:"
              echo "- \`R2_ACCESS_KEY_ID\`"
              echo "- \`R2_SECRET_ACCESS_KEY\`"
              echo ""
              echo "The replacement R2 API token must be created in the same Cloudflare account as \`CF_ACCOUNT_ID\`, scoped to bucket \`${BUCKET_NAME}\`, and allow object read/write access. Then re-run the deploy workflow."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "$OUTPUT"
            echo "::error title=Pulumi R2 backend preflight failed::Unexpected failure while checking R2 S3 access for bucket '$BUCKET_NAME'."
            exit "$STATUS"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Login to Pulumi R2 Backend
        run: |
          BUCKET_NAME="${{ vars.PULUMI_STATE_BUCKET || format('{0}-pulumi-state', steps.prefix.outputs.value) }}"
          R2_ENDPOINT="${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          pulumi login "s3://${BUCKET_NAME}?endpoint=${R2_ENDPOINT}&region=auto"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Select or Create Pulumi Stack
        id: pulumi-select
        working-directory: infra
        run: |
          STACK_NAME="${{ steps.stack.outputs.name }}"
          echo "stack_name=$STACK_NAME" >> $GITHUB_OUTPUT
          pulumi stack select $STACK_NAME 2>/dev/null || pulumi stack init $STACK_NAME
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Set Pulumi Configuration
        working-directory: infra
        run: |
          pulumi config set cloudflareAccountId "$CF_ACCOUNT_ID"
          pulumi config set cloudflareZoneId "$CF_ZONE_ID"
          pulumi config set baseDomain "$BASE_DOMAIN"
          pulumi config set resourcePrefix "$RESOURCE_PREFIX"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
          RESOURCE_PREFIX: ${{ steps.prefix.outputs.value }}

      - name: Pulumi Preview
        if: ${{ inputs.dry_run == true }}
        working-directory: infra
        run: pulumi preview --diff
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_USER_SERVICE_KEY: ${{ secrets.CF_ORIGIN_CA_KEY }}

      - name: Pulumi Refresh
        if: ${{ inputs.dry_run != true }}
        continue-on-error: true
        working-directory: infra
        run: pulumi refresh --yes
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_USER_SERVICE_KEY: ${{ secrets.CF_ORIGIN_CA_KEY }}

      - name: Pulumi Up
        if: ${{ inputs.dry_run != true }}
        working-directory: infra
        run: pulumi up --yes --skip-preview
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_USER_SERVICE_KEY: ${{ secrets.CF_ORIGIN_CA_KEY }}

      # ========================================
      # Phase 2: Configuration
      # ========================================
      - name: Sync Wrangler Config (API + Tail Worker)
        if: ${{ inputs.dry_run != true }}
        run: pnpm tsx scripts/deploy/sync-wrangler-config.ts
        env:
          PULUMI_STACK: ${{ steps.pulumi-select.outputs.stack_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          REQUIRE_APPROVAL: ${{ vars.REQUIRE_APPROVAL }}
          HETZNER_BASE_IMAGE: ${{ vars.HETZNER_BASE_IMAGE }}

      - name: Configure R2 CORS
        if: ${{ inputs.dry_run != true }}
        run: |
          R2_BUCKET_NAME=$(cd infra && pulumi stack output r2Name)
          export R2_BUCKET_NAME
          bash scripts/deploy/configure-r2-cors.sh
        env:
          # AWS_* for Pulumi R2 backend (pulumi stack output)
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          # CF_API_TOKEN for Cloudflare REST API (R2 bucket CORS)
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}

      - name: Configure AI Gateway
        if: ${{ inputs.dry_run != true }}
        run: bash scripts/deploy/configure-ai-gateway.sh
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AI_GATEWAY_ID: ${{ steps.prefix.outputs.value }}

      - name: Check First Deploy Status
        id: first_deploy
        if: ${{ inputs.dry_run != true }}
        run: |
          if [ -f .wrangler/tail-worker-first-deploy ]; then
            echo "is_first=true" >> $GITHUB_OUTPUT
            echo "First deploy detected -- will do two-pass deployment"
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure workers.dev Subdomain
        if: ${{ inputs.dry_run != true }}
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          RESOURCE_PREFIX: ${{ steps.prefix.outputs.value }}
        run: |
          SUBDOMAIN="$RESOURCE_PREFIX"
          echo "Ensuring workers.dev subdomain is initialized: ${SUBDOMAIN}.workers.dev"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"subdomain\": \"${SUBDOMAIN}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "workers.dev subdomain ready: ${SUBDOMAIN}.workers.dev"
          elif [ "$HTTP_CODE" -eq 409 ]; then
            echo "workers.dev subdomain already configured (OK)"
          else
            echo "::warning::Failed to set workers.dev subdomain (HTTP ${HTTP_CODE}): ${BODY}"
            echo "Cron triggers may not work. Initialize manually: CF Dashboard > Workers & Pages > Settings > Domains & Routes"
          fi

      # Verify Pages custom domain is active (must run BEFORE Worker deploys wildcard routes)
      - name: Verify Pages Custom Domain
        if: ${{ inputs.dry_run != true }}
        run: bash scripts/deploy/verify-pages-domain.sh
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          PAGES_PROJECT: ${{ steps.prefix.outputs.value }}-web-${{ steps.stack.outputs.name }}
          PAGES_DOMAIN: app.${{ vars.BASE_DOMAIN }}

      # ========================================
      # Phase 3: Application (Wrangler)
      # ========================================
      - name: Build Applications
        if: ${{ inputs.dry_run != true }}
        run: pnpm build
        env:
          VITE_API_URL: https://api.${{ vars.BASE_DOMAIN }}
          VITE_PUBLIC_WEBSITE_URL: ${{ vars.PUBLIC_WEBSITE_URL || '' }}
          VITE_FEATURE_MULTI_TERMINAL: 'true'

      # Deploy API worker first (without tail_consumers on first deploy)
      - name: Deploy API Worker
        if: ${{ inputs.dry_run != true }}
        run: |
          OUTPUT=$(pnpm --filter @simple-agent-manager/api exec wrangler deploy --env "$DEPLOY_ENV" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "not inherited by environments"; then
            echo ""
            echo "::error::Wrangler detected non-inherited bindings. Check sync-wrangler-config.ts."
            echo "See: .claude/rules/07-env-and-urls.md"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ENV: ${{ inputs.environment }}

      # Tail Worker must deploy AFTER API Worker (service binding dependency)
      - name: Deploy Tail Worker
        if: ${{ inputs.dry_run != true }}
        run: pnpm --filter @simple-agent-manager/tail-worker exec wrangler deploy --env ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # On first deploy: tail worker now exists, re-sync to add tail_consumers and re-deploy API
      - name: Re-sync Wrangler Config (add tail_consumers)
        if: ${{ inputs.dry_run != true && steps.first_deploy.outputs.is_first == 'true' }}
        run: |
          rm -f .wrangler/tail-worker-first-deploy
          pnpm tsx scripts/deploy/sync-wrangler-config.ts
        env:
          PULUMI_STACK: ${{ steps.pulumi-select.outputs.stack_name }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          REQUIRE_APPROVAL: ${{ vars.REQUIRE_APPROVAL }}
          HETZNER_BASE_IMAGE: ${{ vars.HETZNER_BASE_IMAGE }}

      - name: Re-deploy API Worker (with tail_consumers)
        if: ${{ inputs.dry_run != true && steps.first_deploy.outputs.is_first == 'true' }}
        run: |
          OUTPUT=$(pnpm --filter @simple-agent-manager/api exec wrangler deploy --env "$DEPLOY_ENV" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ENV: ${{ inputs.environment }}

      - name: Deploy Web UI
        if: ${{ inputs.dry_run != true }}
        run: |
          PREFIX="${{ steps.prefix.outputs.value }}"
          STACK="${{ steps.stack.outputs.name }}"
          PROJECT_NAME="${PREFIX}-web-${STACK}"
          # --branch main: Deploy as "production" so custom domains serve this deployment.
          # Without this, PR branches deploy as "preview" and custom domains show "Deployment Not Found".
          pnpm --filter @simple-agent-manager/web exec wrangler pages deploy dist --project-name $PROJECT_NAME --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Backup D1 Databases (pre-migration safety net)
        if: ${{ inputs.dry_run != true }}
        id: d1_backup
        working-directory: infra
        run: |
          DB_NAME=$(pulumi stack output d1DatabaseName)
          DB_ID=$(pulumi stack output d1DatabaseId)
          OBS_DB_NAME=$(pulumi stack output observabilityD1DatabaseName)
          OBS_DB_ID=$(pulumi stack output observabilityD1DatabaseId)

          echo "Creating D1 time-travel bookmark before migrations..."
          echo "Database: $DB_NAME ($DB_ID)"
          echo "Obs Database: $OBS_DB_NAME ($OBS_DB_ID)"

          # D1 supports time-travel (point-in-time recovery) for the last 30 days.
          # Record the current timestamp so we can restore if a migration causes data loss.
          # Note: wrangler v4 removed `d1 backup create` — time-travel is the only recovery mechanism.
          BACKUP_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Pre-migration timestamp: $BACKUP_TIMESTAMP"
          echo "To restore: wrangler d1 time-travel restore $DB_NAME --timestamp=$BACKUP_TIMESTAMP"
          echo "backup_timestamp=$BACKUP_TIMESTAMP" >> "$GITHUB_OUTPUT"

          echo "Pre-migration time-travel bookmark: $BACKUP_TIMESTAMP"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Record pre-migration row counts (data integrity baseline)
        if: ${{ inputs.dry_run != true }}
        id: pre_migration_counts
        working-directory: infra
        run: |
          DB_NAME=$(pulumi stack output d1DatabaseName)
          cd ../apps/api

          echo "=== Pre-Migration Row Counts ==="
          COUNTS=""
          for table in projects users tasks triggers trigger_executions agent_profiles credentials nodes workspaces sessions project_deployment_credentials project_runtime_env_vars project_runtime_files; do
            COUNT=$(pnpm exec wrangler d1 execute "$DB_NAME" \
              --remote --env ${{ inputs.environment }} \
              --command="SELECT COUNT(*) as count FROM $table" \
              --json 2>/dev/null | node -e "
                const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                console.log(data[0]?.results?.[0]?.count ?? '-1');
              " 2>/dev/null || echo "-1")
            echo "  $table: $COUNT rows"
            COUNTS="${COUNTS}${table}:${COUNT},"
          done
          echo "counts=${COUNTS}" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Run Database Migrations
        if: ${{ inputs.dry_run != true }}
        working-directory: infra
        run: |
          DB_NAME=$(pulumi stack output d1DatabaseName)
          OBS_DB_NAME=$(pulumi stack output observabilityD1DatabaseName)
          cd ../apps/api
          pnpm exec wrangler d1 migrations apply $DB_NAME --remote --env ${{ inputs.environment }}
          pnpm exec wrangler d1 migrations apply $OBS_DB_NAME --remote --env ${{ inputs.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Verify post-migration data integrity (BLOCKS DEPLOY ON DATA LOSS)
        if: ${{ inputs.dry_run != true }}
        working-directory: infra
        run: |
          DB_NAME=$(pulumi stack output d1DatabaseName)
          PRE_COUNTS="${{ steps.pre_migration_counts.outputs.counts }}"
          BACKUP_TS="${{ steps.d1_backup.outputs.backup_timestamp }}"
          cd ../apps/api

          echo "=== Post-Migration Data Integrity Check ==="
          echo "Pre-migration backup timestamp: $BACKUP_TS"
          echo ""

          FAILED=0
          IFS=',' read -ra PAIRS <<< "$PRE_COUNTS"
          for pair in "${PAIRS[@]}"; do
            [ -z "$pair" ] && continue
            TABLE="${pair%%:*}"
            PRE_COUNT="${pair##*:}"

            # Skip tables where pre-count failed (new tables, etc.)
            [ "$PRE_COUNT" = "-1" ] && continue

            POST_COUNT=$(pnpm exec wrangler d1 execute "$DB_NAME" \
              --remote --env ${{ inputs.environment }} \
              --command="SELECT COUNT(*) as count FROM $TABLE" \
              --json 2>/dev/null | node -e "
                const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
                console.log(data[0]?.results?.[0]?.count ?? '-1');
              " 2>/dev/null || echo "-1")

            [ "$POST_COUNT" = "-1" ] && continue

            # Check for catastrophic data loss (>50% row count drop)
            if [ "$PRE_COUNT" -gt 0 ] && [ "$POST_COUNT" -eq 0 ]; then
              echo "::error::CRITICAL DATA LOSS: $TABLE had $PRE_COUNT rows, now has 0!"
              echo "  Restore with: wrangler d1 time-travel restore $DB_NAME --timestamp=$BACKUP_TS"
              FAILED=1
            elif [ "$PRE_COUNT" -gt 10 ] && [ "$POST_COUNT" -lt $(( PRE_COUNT / 2 )) ]; then
              echo "::error::SIGNIFICANT DATA LOSS: $TABLE dropped from $PRE_COUNT to $POST_COUNT rows (>50% loss)"
              echo "  Restore with: wrangler d1 time-travel restore $DB_NAME --timestamp=$BACKUP_TS"
              FAILED=1
            else
              echo "  $TABLE: $PRE_COUNT -> $POST_COUNT rows (OK)"
            fi
          done

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::POST-MIGRATION DATA INTEGRITY CHECK FAILED — DEPLOY BLOCKED"
            echo "::error::Data loss detected. Deployment is halted to prevent serving with corrupt data."
            echo "::error::Restore command: wrangler d1 time-travel restore $DB_NAME --timestamp=$BACKUP_TS"
            echo ""
            echo "## DATA INTEGRITY ALERT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Post-migration verification detected data loss." >> $GITHUB_STEP_SUMMARY
            echo "Pre-migration backup: \`$BACKUP_TS\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Restore command:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "wrangler d1 time-travel restore $DB_NAME --timestamp=$BACKUP_TS" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "Post-migration data integrity check PASSED. No unexpected data loss."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Enable Trials on Staging (KV kill-switch)
        # Trials are gated by a KV flag that fails closed. Staging always enables them
        # automatically so the /try flow is live after every deploy. Production stays
        # opt-in (operator flips the flag manually when ready to accept live traffic).
        if: ${{ inputs.dry_run != true && inputs.environment == 'staging' }}
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Enabling trials kill-switch on staging (KV trials:enabled=true)"
          # Wrangler v4: KV commands default to local; --remote required for deployed KV.
          pnpm exec wrangler kv key put "trials:enabled" "true" \
            --binding KV \
            --env staging \
            --remote

      - name: Configure Worker Secrets
        if: ${{ inputs.dry_run != true }}
        run: bash scripts/deploy/configure-secrets.sh ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          PULUMI_STACK: ${{ steps.pulumi-select.outputs.stack_name }}
          SECRET_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SECRET_JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          SECRET_JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SMOKE_TEST_AUTH_ENABLED: ${{ secrets.SMOKE_TEST_AUTH_ENABLED }}
          ANTHROPIC_API_KEY_TRIAL: ${{ secrets.ANTHROPIC_API_KEY_TRIAL }}
          SEGMENT_WRITE_KEY: ${{ secrets.SEGMENT_WRITE_KEY }}
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}

      # Secret writes create fresh Worker deployments. Re-deploy once after all
      # secrets are configured so routes serving the web app keep the current
      # Worker asset bundle instead of regressing to a previous deployment.
      - name: Re-deploy API Worker (after secrets)
        if: ${{ inputs.dry_run != true }}
        run: |
          OUTPUT=$(pnpm --filter @simple-agent-manager/api exec wrangler deploy --env "$DEPLOY_ENV" 2>&1) || {
            echo "$OUTPUT"
            exit 1
          }
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "not inherited by environments"; then
            echo ""
            echo "::error::Wrangler detected non-inherited bindings. Check sync-wrangler-config.ts."
            echo "See: .claude/rules/07-env-and-urls.md"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DEPLOY_ENV: ${{ inputs.environment }}

      # ========================================
      # Phase 4: VM Agent
      # ========================================
      - name: Setup Go
        if: ${{ inputs.dry_run != true }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build VM Agent
        if: ${{ inputs.dry_run != true && inputs.skip_agent != true }}
        run: make -C packages/vm-agent build-all

      - name: Upload VM Agent Binaries
        if: ${{ inputs.dry_run != true && inputs.skip_agent != true }}
        working-directory: infra
        run: |
          R2_BUCKET=$(pulumi stack output r2Name)
          # Wrangler v4: R2 commands default to local; --remote required for deployed R2.
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/agents/vm-agent-linux-amd64 --file $GITHUB_WORKSPACE/packages/vm-agent/bin/vm-agent-linux-amd64 --remote
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/agents/vm-agent-linux-arm64 --file $GITHUB_WORKSPACE/packages/vm-agent/bin/vm-agent-linux-arm64 --remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Build CLI
        if: ${{ inputs.dry_run != true }}
        run: make -C packages/cli build-all version

      - name: Upload CLI Binaries
        if: ${{ inputs.dry_run != true }}
        working-directory: infra
        run: |
          R2_BUCKET=$(pulumi stack output r2Name)
          # Wrangler v4: R2 commands default to local; --remote required for deployed R2.
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/cli/sam-linux-amd64 --file $GITHUB_WORKSPACE/packages/cli/bin/sam-linux-amd64 --remote
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/cli/sam-linux-arm64 --file $GITHUB_WORKSPACE/packages/cli/bin/sam-linux-arm64 --remote
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/cli/sam-darwin-amd64 --file $GITHUB_WORKSPACE/packages/cli/bin/sam-darwin-amd64 --remote
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/cli/sam-darwin-arm64 --file $GITHUB_WORKSPACE/packages/cli/bin/sam-darwin-arm64 --remote
          pnpm --filter @simple-agent-manager/api exec wrangler r2 object put $R2_BUCKET/cli/version.json --file $GITHUB_WORKSPACE/packages/cli/bin/version.json --remote
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ========================================
      # Phase 5: Validation
      # ========================================
      - name: Health Check
        if: ${{ inputs.dry_run != true }}
        run: |
          API_URL="https://api.${{ vars.BASE_DOMAIN }}"
          echo "Waiting for API to be ready at $API_URL..."

          for i in {1..30}; do
            RESPONSE=$(curl -sf "$API_URL/health" 2>/dev/null) || {
              echo "Waiting for API... ($i/30)"
              sleep 10
              continue
            }

            STATUS=$(echo "$RESPONSE" | jq -r '.status // empty')
            if [ "$STATUS" = "healthy" ]; then
              echo "API is healthy"
              echo "$RESPONSE" | jq .
              exit 0
            elif [ "$STATUS" = "degraded" ]; then
              echo "::error::API reports degraded status -- missing bindings detected"
              echo "$RESPONSE" | jq .
              exit 1
            fi

            echo "Waiting for API... ($i/30)"
            sleep 10
          done

          echo "Health check timed out"
          exit 1

      - name: Output Deployment URLs
        id: output
        if: ${{ inputs.dry_run != true }}
        run: |
          echo "api_url=https://api.${{ vars.BASE_DOMAIN }}" >> $GITHUB_OUTPUT
          echo "app_url=https://app.${{ vars.BASE_DOMAIN }}" >> $GITHUB_OUTPUT

      # ========================================
      # Job Summary
      # ========================================
      - name: Write Job Summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "## Pulumi Preview Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This was a **dry run**. No changes were applied." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ job.status }}" = "success" ]; then
            echo "## Deployment Complete (${{ inputs.environment }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
            echo "**Base Domain:** ${{ vars.BASE_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Access URLs" >> $GITHUB_STEP_SUMMARY
            echo "- **API:** https://api.${{ vars.BASE_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Web UI:** https://app.${{ vars.BASE_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### What Was Deployed" >> $GITHUB_STEP_SUMMARY
            echo "- Infrastructure (Pulumi): D1, KV, R2, DNS" >> $GITHUB_STEP_SUMMARY
            echo "- API Worker" >> $GITHUB_STEP_SUMMARY
            echo "- Tail Worker (log streaming)" >> $GITHUB_STEP_SUMMARY
            echo "- Web UI (Pages)" >> $GITHUB_STEP_SUMMARY
            echo "- Database migrations" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.skip_agent }}" != "true" ]; then
              echo "- VM Agent binaries" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## Deployment Failed (${{ inputs.environment }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Security Keys Status
        if: ${{ inputs.dry_run != true }}
        env:
          HAS_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY != '' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Keys" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$HAS_ENCRYPTION_KEY" = "true" ]; then
            echo "Using keys from **GitHub Secrets** (backwards compatibility mode)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To migrate to automatic persistence via Pulumi state:" >> $GITHUB_STEP_SUMMARY
            echo "1. Delete \`ENCRYPTION_KEY\`, \`JWT_PRIVATE_KEY\`, \`JWT_PUBLIC_KEY\` from GitHub Secrets" >> $GITHUB_STEP_SUMMARY
            echo "2. Re-deploy to use Pulumi-managed keys" >> $GITHUB_STEP_SUMMARY
          else
            echo "Keys managed by **Pulumi state** - no manual persistence needed." >> $GITHUB_STEP_SUMMARY
          fi
