name: Teardown

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down'
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: 'Type DELETE to confirm teardown'
        required: true
        type: string
      keep_data:
        description: 'Preserve D1 databases during teardown'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'List resources without deleting (preview mode)'
        required: false
        type: boolean
        default: false
      include_marketing:
        description: 'Also tear down marketing site (www) resources — shared across environments, use with care'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  # Inputs are assigned to env vars to avoid shell injection from ${{ inputs.* }}
  # interpolation. See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections
  INPUT_DRY_RUN: ${{ inputs.dry_run }}
  INPUT_KEEP_DATA: ${{ inputs.keep_data }}
  INPUT_INCLUDE_MARKETING: ${{ inputs.include_marketing }}
  INPUT_ENVIRONMENT: ${{ inputs.environment }}

jobs:
  teardown:
    name: Teardown Cloudflare Resources (${{ inputs.environment }}${{ inputs.dry_run && ' — DRY RUN' || '' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ github.event.inputs.confirm == 'DELETE' }}

    steps:
      # ================================================================
      # Phase 0: Setup
      # ================================================================
      - name: Resolve Resource Names
        id: names
        run: |
          EXPLICIT="${{ vars.RESOURCE_PREFIX }}"
          if [ -n "$EXPLICIT" ]; then
            PREFIX="$EXPLICIT"
          else
            DOMAIN="${{ vars.BASE_DOMAIN }}"
            HASH=$(echo -n "$DOMAIN" | sha256sum | cut -c1-6)
            PREFIX="s${HASH}"
          fi
          if [ "$INPUT_ENVIRONMENT" = "production" ]; then
            STACK="prod"
          else
            STACK="staging"
          fi
          BASE_DOMAIN="${{ vars.BASE_DOMAIN }}"
          if [ -z "$BASE_DOMAIN" ]; then
            echo "::error::BASE_DOMAIN is not set in environment variables."
            exit 1
          fi

          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "base_domain=$BASE_DOMAIN" >> "$GITHUB_OUTPUT"
          echo "api_worker=${PREFIX}-api-${STACK}" >> "$GITHUB_OUTPUT"
          echo "tail_worker=${PREFIX}-tail-worker-${STACK}" >> "$GITHUB_OUTPUT"
          echo "pages_project=${PREFIX}-web-${STACK}" >> "$GITHUB_OUTPUT"
          echo "www_project=${PREFIX}-www" >> "$GITHUB_OUTPUT"
          echo "ai_gateway=${{ vars.AI_GATEWAY_ID || 'sam' }}" >> "$GITHUB_OUTPUT"

          echo "### Resource Names"
          echo "- Stack: $STACK"
          echo "- API Worker: ${PREFIX}-api-${STACK}"
          echo "- Tail Worker: ${PREFIX}-tail-worker-${STACK}"
          echo "- Pages Project: ${PREFIX}-web-${STACK}"
          echo "- WWW Project: ${PREFIX}-www"
          echo "- AI Gateway: ${{ vars.AI_GATEWAY_ID || 'sam' }}"
          echo "- Base Domain: $BASE_DOMAIN"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Pulumi CLI
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0

      - name: Login to Pulumi R2 Backend
        id: pulumi_login
        continue-on-error: true
        run: |
          BUCKET_NAME="${{ vars.PULUMI_STATE_BUCKET || format('{0}-pulumi-state', steps.names.outputs.prefix) }}"
          R2_ENDPOINT="${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          # Pulumi >=3.244 (AWS SDK v2) requires an explicit URL scheme on the S3 endpoint;
          # a scheme-less endpoint fails with 'unsupported protocol scheme ""'.
          pulumi login "s3://${BUCKET_NAME}?endpoint=https://${R2_ENDPOINT}&region=auto"
          echo "status=ok" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Select Pulumi Stack
        id: pulumi_stack
        continue-on-error: true
        working-directory: infra
        run: |
          STACK="${{ steps.names.outputs.stack }}"
          if pulumi stack select "$STACK" 2>/dev/null; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "Pulumi stack '$STACK' selected."
          else
            echo "status=not_found" >> "$GITHUB_OUTPUT"
            echo "::warning::Pulumi stack '$STACK' not found. Pulumi phases will be skipped."
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # ================================================================
      # Phase 1: Delete Workers (not managed by Pulumi)
      # Cloudflare Workers Scripts API: DELETE /accounts/{id}/workers/scripts/{name}
      # ================================================================
      - name: Delete Tail Worker
        id: delete_tail_worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          WORKER_NAME="${{ steps.names.outputs.tail_worker }}"
          API="https://api.cloudflare.com/client/v4"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API/accounts/$CF_ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "DRY RUN: Would delete Tail Worker '$WORKER_NAME' (exists)"
              echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            else
              echo "DRY RUN: Tail Worker '$WORKER_NAME' not found (HTTP $HTTP_CODE)"
              echo "status=dry_run_not_found" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Deleting Tail Worker: $WORKER_NAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
            -X DELETE \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "Tail Worker deleted."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Tail Worker not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete Tail Worker (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete API Worker
        id: delete_api_worker
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          WORKER_NAME="${{ steps.names.outputs.api_worker }}"
          API="https://api.cloudflare.com/client/v4"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API/accounts/$CF_ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "DRY RUN: Would delete API Worker '$WORKER_NAME' (exists)"
              echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            else
              echo "DRY RUN: API Worker '$WORKER_NAME' not found (HTTP $HTTP_CODE)"
              echo "status=dry_run_not_found" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Deleting API Worker: $WORKER_NAME"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
            -X DELETE \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "API Worker deleted."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "API Worker not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete API Worker (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Phase 2: Clean Up Workspace DNS Records (runtime-created ws-*)
      # Searches all record types (A, AAAA, CNAME) matching ws-*.{domain}
      # ================================================================
      - name: Delete Workspace DNS Records
        id: delete_ws_dns
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          BASE_DOMAIN="${{ steps.names.outputs.base_domain }}"
          API="https://api.cloudflare.com/client/v4"
          DELETED=0
          FAILED=0
          PAGE=1

          echo "Searching for workspace DNS records (ws-*.${BASE_DOMAIN})..."

          while true; do
            RESPONSE=$(curl -sf "$API/zones/$CF_ZONE_ID/dns_records?per_page=100&page=$PAGE" \
              -H "Authorization: Bearer $CF_API_TOKEN")

            if [ $? -ne 0 ]; then
              echo "::warning::Failed to list DNS records (page $PAGE)"
              echo "status=failed" >> "$GITHUB_OUTPUT"
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Extract ws-* records — no type filter so we catch A, AAAA, and CNAME
            WS_IDS=$(echo "$RESPONSE" | jq -r ".result[] | select(.name | test(\"^ws-.*\\.${BASE_DOMAIN}$\")) | .id + \" \" + .name")

            if [ -n "$WS_IDS" ]; then
              echo "$WS_IDS" | while IFS=' ' read -r RECORD_ID RECORD_NAME; do
                if [ "$INPUT_DRY_RUN" = "true" ]; then
                  echo "  DRY RUN: Would delete $RECORD_NAME ($RECORD_ID)"
                else
                  DEL_RESP=$(curl -s -w "\n%{http_code}" \
                    "$API/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
                    -X DELETE \
                    -H "Authorization: Bearer $CF_API_TOKEN")
                  DEL_CODE=$(echo "$DEL_RESP" | tail -1)
                  DEL_BODY=$(echo "$DEL_RESP" | sed '$d')
                  if echo "$DEL_BODY" | jq -e '.success == true' > /dev/null 2>&1 || [ "$DEL_CODE" = "404" ]; then
                    echo "  Deleted: $RECORD_NAME"
                    DELETED=$((DELETED + 1))
                  else
                    echo "  Failed: $RECORD_NAME (HTTP $DEL_CODE)"
                    FAILED=$((FAILED + 1))
                  fi
                fi
              done
            fi

            # Check if there are more pages
            TOTAL_PAGES=$(echo "$RESPONSE" | jq -r '.result_info.total_pages // 1')
            if [ "$PAGE" -ge "$TOTAL_PAGES" ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "DRY RUN: Found workspace DNS records to delete"
            echo "status=dry_run" >> "$GITHUB_OUTPUT"
          elif [ "$FAILED" -gt 0 ]; then
            echo "Deleted $DELETED, failed $FAILED workspace DNS records."
            echo "status=partial" >> "$GITHUB_OUTPUT"
          elif [ "$DELETED" -gt 0 ]; then
            echo "Deleted $DELETED workspace DNS records."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          else
            echo "No workspace DNS records found."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          fi
          echo "count=$DELETED" >> "$GITHUB_OUTPUT"

      # ================================================================
      # Phase 3: Delete Marketing Site Resources
      # The www Pages project ({prefix}-www) is shared across environments.
      # This phase is opt-in (include_marketing defaults to false).
      # ================================================================
      - name: Delete Apex Redirect Page Rule
        id: delete_page_rule
        if: ${{ inputs.include_marketing }}
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          BASE_DOMAIN="${{ steps.names.outputs.base_domain }}"
          API="https://api.cloudflare.com/client/v4"

          echo "Looking for Page Rule matching ${BASE_DOMAIN}/*..."
          RULE_ID=$(curl -sf "$API/zones/$CF_ZONE_ID/pagerules?status=active" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r --arg pattern "${BASE_DOMAIN}/*" \
            '.result[] | select(.targets[0].constraint.value == $pattern) | .id' 2>/dev/null)

          if [ -z "$RULE_ID" ] || [ "$RULE_ID" = "null" ]; then
            echo "No matching Page Rule found."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "DRY RUN: Would delete Page Rule $RULE_ID (${BASE_DOMAIN}/*)"
            echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Deleting Page Rule: $RULE_ID"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/zones/$CF_ZONE_ID/pagerules/$RULE_ID" \
            -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "Page Rule deleted."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Page Rule not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete Page Rule (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove WWW Custom Domain from Pages
        id: delete_www_domain
        if: ${{ inputs.include_marketing }}
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          WWW_DOMAIN="www.${{ steps.names.outputs.base_domain }}"
          WWW_PROJECT="${{ steps.names.outputs.www_project }}"
          API="https://api.cloudflare.com/client/v4"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$WWW_PROJECT/domains/$WWW_DOMAIN" \
              -H "Authorization: Bearer $CF_API_TOKEN")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "DRY RUN: Would remove custom domain $WWW_DOMAIN from $WWW_PROJECT"
              echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            else
              echo "DRY RUN: Custom domain $WWW_DOMAIN not found (HTTP $HTTP_CODE)"
              echo "status=dry_run_not_found" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Removing custom domain $WWW_DOMAIN from $WWW_PROJECT..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$WWW_PROJECT/domains/$WWW_DOMAIN" \
            -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "Custom domain removed."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Custom domain not found (already removed)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to remove custom domain (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete Marketing DNS Records
        id: delete_www_dns
        if: ${{ inputs.include_marketing }}
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          BASE_DOMAIN="${{ steps.names.outputs.base_domain }}"
          API="https://api.cloudflare.com/client/v4"
          WWW_STATUS="not_found"
          APEX_STATUS="not_found"

          # --- Remove www CNAME ---
          echo "=== Checking CNAME record for www.$BASE_DOMAIN ==="
          RECORD_ID=$(curl -sf "$API/zones/$CF_ZONE_ID/dns_records?type=CNAME&name=www.$BASE_DOMAIN" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[0].id // empty' 2>/dev/null)

          if [ -n "$RECORD_ID" ]; then
            if [ "$INPUT_DRY_RUN" = "true" ]; then
              echo "DRY RUN: Would delete www CNAME ($RECORD_ID)"
              WWW_STATUS="dry_run_exists"
            else
              echo "Deleting www CNAME: $RECORD_ID"
              DEL_RESP=$(curl -s -w "\n%{http_code}" \
                "$API/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
                -X DELETE -H "Authorization: Bearer $CF_API_TOKEN")
              DEL_CODE=$(echo "$DEL_RESP" | tail -1)
              DEL_BODY=$(echo "$DEL_RESP" | sed '$d')
              if echo "$DEL_BODY" | jq -e '.success == true' > /dev/null 2>&1 || [ "$DEL_CODE" = "404" ]; then
                echo "www CNAME deleted."
                WWW_STATUS="deleted"
              else
                echo "::warning::Failed to delete www CNAME (HTTP $DEL_CODE)"
                WWW_STATUS="failed"
              fi
            fi
          else
            echo "No www CNAME record found."
          fi

          # --- Remove apex A record ---
          echo ""
          echo "=== Checking A record for $BASE_DOMAIN ==="
          RECORD_ID=$(curl -sf "$API/zones/$CF_ZONE_ID/dns_records?type=A&name=$BASE_DOMAIN" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[] | select(.content == "192.0.2.1") | .id' 2>/dev/null)

          if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
            if [ "$INPUT_DRY_RUN" = "true" ]; then
              echo "DRY RUN: Would delete apex A record ($RECORD_ID)"
              APEX_STATUS="dry_run_exists"
            else
              echo "Deleting apex A record: $RECORD_ID"
              DEL_RESP=$(curl -s -w "\n%{http_code}" \
                "$API/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
                -X DELETE -H "Authorization: Bearer $CF_API_TOKEN")
              DEL_CODE=$(echo "$DEL_RESP" | tail -1)
              DEL_BODY=$(echo "$DEL_RESP" | sed '$d')
              if echo "$DEL_BODY" | jq -e '.success == true' > /dev/null 2>&1 || [ "$DEL_CODE" = "404" ]; then
                echo "Apex A record deleted."
                APEX_STATUS="deleted"
              else
                echo "::warning::Failed to delete apex A record (HTTP $DEL_CODE)"
                APEX_STATUS="failed"
              fi
            fi
          else
            echo "No apex A record found (or not pointing to 192.0.2.1)."
          fi

          echo "www_status=$WWW_STATUS" >> "$GITHUB_OUTPUT"
          echo "apex_status=$APEX_STATUS" >> "$GITHUB_OUTPUT"

      - name: Delete Marketing Pages Project
        id: delete_www_pages
        if: ${{ inputs.include_marketing }}
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          WWW_PROJECT="${{ steps.names.outputs.www_project }}"
          API="https://api.cloudflare.com/client/v4"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$WWW_PROJECT" \
              -H "Authorization: Bearer $CF_API_TOKEN")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "DRY RUN: Would delete Pages project '$WWW_PROJECT'"
              echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            else
              echo "DRY RUN: Pages project '$WWW_PROJECT' not found (HTTP $HTTP_CODE)"
              echo "status=dry_run_not_found" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Deleting Pages project: $WWW_PROJECT"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$WWW_PROJECT" \
            -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "Pages project deleted."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Pages project not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete Pages project (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Phase 4: Delete AI Gateway
      # ================================================================
      - name: Delete AI Gateway
        id: delete_ai_gateway
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          GATEWAY_ID="${{ steps.names.outputs.ai_gateway }}"
          API="https://api.cloudflare.com/client/v4"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "$API/accounts/$CF_ACCOUNT_ID/ai-gateway/gateways/$GATEWAY_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "DRY RUN: Would delete AI Gateway '$GATEWAY_ID'"
              echo "status=dry_run_exists" >> "$GITHUB_OUTPUT"
            else
              echo "DRY RUN: AI Gateway '$GATEWAY_ID' not found (HTTP $HTTP_CODE)"
              echo "status=dry_run_not_found" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "Deleting AI Gateway: $GATEWAY_ID"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/ai-gateway/gateways/$GATEWAY_ID" \
            -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "AI Gateway deleted."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "AI Gateway not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete AI Gateway (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Phase 5: Pulumi Destroy
      # ================================================================
      - name: Unprotect Pulumi Resources
        id: unprotect
        if: ${{ steps.pulumi_stack.outputs.status == 'ok' && inputs.dry_run != true }}
        continue-on-error: true
        working-directory: infra
        run: |
          echo "Scanning for protected Pulumi resources..."

          # Use structured JSON export for robust URN parsing
          URNS=$(pulumi stack export 2>/dev/null | jq -r '.deployment.resources[].urn // empty' || true)

          if [ -z "$URNS" ]; then
            echo "No URNs found in stack."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNPROTECTED=0

          # Unprotect RandomId (encryption key) and PrivateKey (JWT, Origin CA) resources
          for URN in $URNS; do
            if echo "$URN" | grep -qE 'RandomId|PrivateKey'; then
              if [ "$INPUT_KEEP_DATA" = "true" ]; then
                # When keeping data, also keep the encryption/JWT/Origin CA keys (needed for re-deploy)
                echo "  Keeping protected: $URN (keep_data=true)"
                continue
              fi
              echo "  Unprotecting: $URN"
              pulumi state unprotect "$URN" --yes 2>/dev/null || true
              UNPROTECTED=$((UNPROTECTED + 1))
            fi
          done

          echo "Unprotected $UNPROTECTED resources."
          echo "status=ok" >> "$GITHUB_OUTPUT"
          echo "count=$UNPROTECTED" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi Destroy
        id: pulumi_destroy
        if: ${{ steps.pulumi_stack.outputs.status == 'ok' }}
        continue-on-error: true
        working-directory: infra
        run: |
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "DRY RUN: Listing Pulumi-managed resources..."
            echo ""
            # Show resources that would be destroyed
            pulumi stack export 2>/dev/null | jq -r '.deployment.resources[] | select(.urn | test("pulumi:pulumi:Stack") | not) | "  " + .type + " :: " + .urn' || true
            echo ""
            echo "Run without dry_run to destroy these resources."
            echo "status=dry_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$INPUT_KEEP_DATA" = "true" ]; then
            echo "keep_data=true: Preserving D1 databases and security keys."

            # Get all URNs via structured export, filter out preserved resources
            ALL_URNS=$(pulumi stack export 2>/dev/null | jq -r '.deployment.resources[].urn // empty' || true)
            TARGET_ARGS=()

            for URN in $ALL_URNS; do
              # Skip D1 databases
              if echo "$URN" | grep -q 'D1Database'; then
                echo "  Preserving: $URN"
                continue
              fi
              # Skip security keys (still protected)
              if echo "$URN" | grep -qE 'RandomId|PrivateKey'; then
                echo "  Preserving: $URN"
                continue
              fi
              # Skip the Pulumi stack resource itself
              if echo "$URN" | grep -q 'pulumi:pulumi:Stack'; then
                continue
              fi
              TARGET_ARGS+=(--target "$URN")
            done

            if [ ${#TARGET_ARGS[@]} -eq 0 ]; then
              echo "No resources to destroy (all preserved)."
              echo "status=skipped" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Destroying ${#TARGET_ARGS[@]} targeted resources..."
            pulumi destroy --yes --target-dependents "${TARGET_ARGS[@]}"
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          else
            echo "Full destroy..."
            pulumi destroy --yes
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # ================================================================
      # Phase 5b: Fallback — delete web Pages project via CF API
      # If Pulumi destroy failed or was skipped, directly delete the
      # web UI Pages project so it doesn't become an orphan.
      # ================================================================
      - name: Delete Web Pages Project (fallback)
        id: delete_web_pages_fallback
        if: ${{ steps.pulumi_destroy.outputs.status != 'deleted' && steps.pulumi_destroy.outputs.status != 'dry_run' && inputs.dry_run != true }}
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          PAGES_PROJECT="${{ steps.names.outputs.pages_project }}"
          API="https://api.cloudflare.com/client/v4"

          echo "Fallback: Deleting web Pages project '$PAGES_PROJECT' via CF API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "$API/accounts/$CF_ACCOUNT_ID/pages/projects/$PAGES_PROJECT" \
            -X DELETE \
            -H "Authorization: Bearer $CF_API_TOKEN")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "Web Pages project deleted (fallback)."
            echo "status=deleted" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Web Pages project not found (already deleted)."
            echo "status=not_found" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to delete web Pages project (HTTP $HTTP_CODE)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      # ================================================================
      # Phase 6: Stack Cleanup
      # ================================================================
      - name: Remove Pulumi Stack
        id: remove_stack
        if: ${{ !inputs.keep_data && !inputs.dry_run && steps.pulumi_stack.outputs.status == 'ok' && steps.pulumi_destroy.outputs.status == 'deleted' }}
        continue-on-error: true
        working-directory: infra
        run: |
          STACK="${{ steps.names.outputs.stack }}"
          echo "Removing Pulumi stack: $STACK"
          pulumi stack rm "$STACK" --yes --force 2>/dev/null || true
          echo "status=removed" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # ================================================================
      # Phase 7: Job Summary
      # ================================================================
      - name: Write Job Summary
        if: always()
        run: |
          BUCKET_NAME="${{ vars.PULUMI_STATE_BUCKET || format('{0}-pulumi-state', steps.names.outputs.prefix) }}"

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            echo "## Teardown Preview (Dry Run) — $INPUT_ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Teardown Results — $INPUT_ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Category | Resource | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|----------|--------|" >> "$GITHUB_STEP_SUMMARY"

          # Helper to format status
          fmt() {
            case "$1" in
              deleted) echo "Deleted" ;;
              not_found) echo "Not Found" ;;
              failed) echo "**FAILED**" ;;
              skipped) echo "Skipped" ;;
              partial) echo "Partial" ;;
              removed) echo "Removed" ;;
              dry_run*) echo "Would Delete" ;;
              preserved) echo "Preserved" ;;
              *) echo "$1" ;;
            esac
          }

          # Workers
          echo "| Workers | Tail Worker (\`${{ steps.names.outputs.tail_worker }}\`) | $(fmt "${{ steps.delete_tail_worker.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workers | API Worker (\`${{ steps.names.outputs.api_worker }}\`) | $(fmt "${{ steps.delete_api_worker.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"

          # Workspace DNS
          echo "| DNS | Workspace records (\`ws-*\`) | $(fmt "${{ steps.delete_ws_dns.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"

          # Marketing site
          if [ "$INPUT_INCLUDE_MARKETING" = "true" ]; then
            echo "| Marketing | Page Rule (\`${{ steps.names.outputs.base_domain }}/*\`) | $(fmt "${{ steps.delete_page_rule.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Marketing | Custom Domain (\`www.${{ steps.names.outputs.base_domain }}\`) | $(fmt "${{ steps.delete_www_domain.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Marketing | DNS (www CNAME) | $(fmt "${{ steps.delete_www_dns.outputs.www_status }}") |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Marketing | DNS (apex A) | $(fmt "${{ steps.delete_www_dns.outputs.apex_status }}") |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Marketing | Pages Project (\`${{ steps.names.outputs.www_project }}\`) | $(fmt "${{ steps.delete_www_pages.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Marketing | *(skipped — include_marketing=false)* | Skipped |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # AI Gateway
          echo "| AI | Gateway (\`${{ steps.names.outputs.ai_gateway }}\`) | $(fmt "${{ steps.delete_ai_gateway.outputs.status }}") |" >> "$GITHUB_STEP_SUMMARY"

          # Pulumi
          PULUMI_STATUS="${{ steps.pulumi_stack.outputs.status }}"
          if [ "$PULUMI_STATUS" = "not_found" ]; then
            echo "| Pulumi | All Pulumi-managed resources | Stack Not Found (skipped) |" >> "$GITHUB_STEP_SUMMARY"
          else
            DESTROY_STATUS="${{ steps.pulumi_destroy.outputs.status }}"
            if [ "$INPUT_KEEP_DATA" = "true" ]; then
              echo "| Pulumi | D1 Databases | Preserved |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Pulumi | Security Keys (encryption, JWT, Origin CA) | Preserved |" >> "$GITHUB_STEP_SUMMARY"
              echo "| Pulumi | Other resources (KV, R2, DNS, Pages, Origin CA cert) | $(fmt "$DESTROY_STATUS") |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Pulumi | All resources (D1, KV, R2, DNS, Pages, Origin CA, Keys) | $(fmt "$DESTROY_STATUS") |" >> "$GITHUB_STEP_SUMMARY"
            fi
            STACK_STATUS="${{ steps.remove_stack.outputs.status }}"
            if [ -n "$STACK_STATUS" ]; then
              echo "| Pulumi | Stack (\`${{ steps.names.outputs.stack }}\`) | $(fmt "$STACK_STATUS") |" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # Web Pages fallback
          FALLBACK_STATUS="${{ steps.delete_web_pages_fallback.outputs.status }}"
          if [ -n "$FALLBACK_STATUS" ]; then
            echo "| Fallback | Web Pages Project (\`${{ steps.names.outputs.pages_project }}\`) | $(fmt "$FALLBACK_STATUS") |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Not Removed (manual cleanup if needed)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pulumi state R2 bucket** (\`${BUCKET_NAME}\`) — contains encrypted state for re-deploys. Delete manually in Cloudflare dashboard if no longer needed." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Hetzner VMs** — user-provisioned VMs are not managed by this workflow. Delete via Hetzner console or your cloud provider." >> "$GITHUB_STEP_SUMMARY"
          echo "- **GitHub environment secrets** — stored in GitHub Settings, not Cloudflare. Remove via Settings > Environments." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cloudflare account and zone** — the DNS zone, account, and subscription are not deleted." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Workers.dev subdomain** — account-level setting shared across all Workers. Remove manually in Cloudflare dashboard only when decommissioning the entire account." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Analytics Engine data** — \`sam_analytics\` dataset data persists for up to 90 days per Cloudflare retention policy." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Troubleshooting section if any failures
          if echo "${{ steps.delete_tail_worker.outputs.status }} ${{ steps.delete_api_worker.outputs.status }} ${{ steps.delete_ws_dns.outputs.status }} ${{ steps.delete_page_rule.outputs.status }} ${{ steps.delete_www_domain.outputs.status }} ${{ steps.delete_www_pages.outputs.status }} ${{ steps.delete_ai_gateway.outputs.status }} ${{ steps.pulumi_destroy.outputs.status }}" | grep -q "failed"; then
            echo "### Troubleshooting" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Some resources failed to delete. Check the step logs above for details." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Verify \`CF_API_TOKEN\` has sufficient permissions (Workers, Pages, DNS, AI Gateway)" >> "$GITHUB_STEP_SUMMARY"
            echo "- Verify \`PULUMI_CONFIG_PASSPHRASE\` matches the one used during deployment" >> "$GITHUB_STEP_SUMMARY"
            echo "- Check that R2 credentials (\`R2_ACCESS_KEY_ID\`, \`R2_SECRET_ACCESS_KEY\`) are correct" >> "$GITHUB_STEP_SUMMARY"
            echo "- Some resources may need manual deletion in the Cloudflare dashboard" >> "$GITHUB_STEP_SUMMARY"
          fi

  # Confirmation job that runs first if confirm != DELETE
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm != 'DELETE' }}
    steps:
      - name: Confirmation Required
        run: |
          echo "::error::Teardown requires confirmation. Type 'DELETE' in the confirm field."
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Teardown Cancelled" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "You must type \`DELETE\` in the confirmation field to proceed with teardown." >> "$GITHUB_STEP_SUMMARY"
          exit 1
