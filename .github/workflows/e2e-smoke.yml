name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/www/**'

permissions:
  contents: read

jobs:
  vm-agent-smoke:
    name: VM Agent Smoke (${{ matrix.control_plane }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - control_plane: mock
            command: pnpm test:e2e:vm-agent-smoke
          - control_plane: worker
            command: pnpm test:e2e:vm-agent-smoke:worker

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: ${{ matrix.command }}
