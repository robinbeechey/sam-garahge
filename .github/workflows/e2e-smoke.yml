name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/www/**'

permissions:
  contents: read

jobs:
  vm-agent-smoke:
    name: VM Agent Smoke (${{ matrix.control_plane }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - control_plane: mock
            command: pnpm test:e2e:vm-agent-smoke
          - control_plane: worker
            command: pnpm test:e2e:vm-agent-smoke:worker

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smoke test
        run: ${{ matrix.command }}
